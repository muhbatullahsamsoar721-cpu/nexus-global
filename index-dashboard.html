<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <title>Nexus Dashboard</title>
  <style>
    body { background: #0a0e27; color: #fff; font-family: Arial; margin: 0; padding: 20px; }
    .container { max-width: 1200px; margin: 0 auto; }
    .header { text-align: center; margin-bottom: 40px; }
    .header h1 { font-size: 2.5em; color: #00ff88; }
    .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
    .stat-card { background: #1a1f3a; border: 2px solid #00ff88; border-radius: 10px; padding: 20px; text-align: center; }
    .stat-card h3 { color: #00ff88; margin-bottom: 10px; }
    .stat-card .value { font-size: 2.5em; font-weight: bold; color: #fff; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🛡️ Nexus Cyber Guardian</h1>
    </div>
    <div class="stats">
      <div class="stat-card">
        <h3>تهديدات</h3>
        <div class="value" id="threats">-</div>
      </div>
      <div class="stat-card">
        <h3>حل شده</h3>
        <div class="value" id="resolved">-</div>
      </div>
      <div class="stat-card">
        <h3>آپ تايم</h3>
        <div class="value" id="uptime">-</div>
      </div>
      <div class="stat-card">
        <h3>دقت</h3>
        <div class="value" id="accuracy">-</div>
      </div>
    </div>
  </div>
  <script>
    fetch('http://localhost:5000/api/dashboard')
      .then(r => r.json())
      .then(d => {
        document.getElementById('threats').textContent = d.threats;
        document.getElementById('resolved').textContent = d.resolved;
        document.getElementById('uptime').textContent = d.uptime + '%';
        document.getElementById('accuracy').textContent = d.accuracy + '%';
      });
  </script>
</body>
</html>
