<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛡️ Nexus Cyber Guardian</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#0a0e27,#1a1f3a);color:#fff;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
        .container{max-width:800px;width:100%;text-align:center}
        h1{font-size:2.5em;color:#00ff88;margin-bottom:10px}
        .subtitle{color:#8899aa;margin-bottom:30px}
        .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:15px;margin:30px 0}
        .card{background:rgba(26,31,58,0.8);border:1px solid rgba(0,255,136,0.3);border-radius:12px;padding:20px}
        .card .value{font-size:2.5em;font-weight:bold;color:#00ff88}
        .card .label{color:#8899aa}
        .btn{display:inline-block;padding:15px 30px;background:#00ff88;color:#0a0e27;border-radius:30px;text-decoration:none;font-weight:bold;margin:10px}
        .footer{margin-top:40px;color:#667788}
        .status{display:inline-block;padding:8px 20px;background:rgba(0,255,136,0.1);border:1px solid #00ff88;border-radius:20px;margin:20px 0}
    </style>
</head>
<body>
    <div class="container">
        <h1>🛡️ Nexus Cyber Guardian</h1>
        <p class="subtitle">AI-Powered Cybersecurity Platform</p>
        <div class="status">✅ All Systems Operational</div>
        
        <div class="stats">
            <div class="card"><div class="value">1,234</div><div class="label">Threats Detected</div></div>
            <div class="card"><div class="value">1,200</div><div class="label">Resolved</div></div>
            <div class="card"><div class="value">99.99%</div><div class="label">Uptime</div></div>
            <div class="card"><div class="value">99.9%</div><div class="label">Accuracy</div></div>
        </div>
        
        <a href="https://github.com/muhbatullahsamsoar721-cpu/nexus-guardian" class="btn">📦 View on GitHub</a>
        <a href="mailto:muhbatullahsamsoar721@gmail.com" class="btn">📧 Contact Founder</a>
        
        <div class="footer">
            <p>🇦🇫 Built by Muhbatullah Samsoor | © 2026</p>
        </div>
    </div>
</body>
</html>
